name: Build Lua C Dependencies

# This workflow only runs manually and is used to package reusable Lua native dependencies.
# 该工作流仅支持手动触发，用于打包可复用的 Lua 原生依赖产物。
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
      linux_x64_runner:
        description: "Linux x64 runner (off to disable)"
        required: true
        default: "ubuntu-24.04"
        type: choice
        options: ["off", "ubuntu-24.04"]
      linux_arm64_runner:
        description: "Linux ARM64 runner (off to disable)"
        required: true
        default: "ubuntu-24.04-arm"
        type: choice
        options: ["off", "ubuntu-24.04-arm"]
      macos_arm64_runner:
        description: "macOS ARM64 runner (off to disable)"
        required: true
        default: "macos-15"
        type: choice
        options: ["off", "macos-15"]
      macos_x64_runner:
        description: "macOS x64 runner (off to disable)"
        required: true
        default: "macos-15-intel"
        type: choice
        options: ["off", "macos-15-intel"]
      windows_x64_runner:
        description: "Windows x64 runner (off to disable)"
        required: true
        default: "windows-latest"
        type: choice
        options: ["off", "windows-latest"]

permissions:
  contents: write

concurrency:
  group: lua-deps-${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: true

env:
  # DEPS_LAYOUT_VERSION is the manual invalidation knob for local runner state.
  # DEPS_LAYOUT_VERSION 用于控制本地 runner 持久化依赖状态的失效版本。
  DEPS_LAYOUT_VERSION: "20260425-04"
  # Dependency versions are centralized here so cache keys and build commands stay aligned.
  # 依赖版本统一集中在这里维护，确保缓存键与构建命令始终保持一致。
  OPENSSL_VERSION: "3.4.1"
  CURL_VERSION: "8.13.0"
  ZLIB_VERSION: "1.3.1"
  PCRE2_VERSION: "10.45"
  LIBYAML_VERSION: "0.2.5"
  PERL_VERSION: "5.38.2.2"
  # WINDOWS_LIBYAML_BUILD_VERSION only tracks Windows libyaml-specific rebuild semantics.
  # WINDOWS_LIBYAML_BUILD_VERSION 仅跟踪 Windows 下 libyaml 的专属重建语义。
  WINDOWS_LIBYAML_BUILD_VERSION: "20260413-02"

jobs:
  prepare-matrix:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_targets: ${{ steps.build-matrix.outputs.has_targets }}
    steps:
      - name: Build matrix from manual runner inputs
        id: build-matrix
        shell: pwsh
        env:
          INPUT_LINUX_X64_RUNNER: ${{ inputs.linux_x64_runner }}
          INPUT_LINUX_ARM64_RUNNER: ${{ inputs.linux_arm64_runner }}
          INPUT_MACOS_ARM64_RUNNER: ${{ inputs.macos_arm64_runner }}
          INPUT_MACOS_X64_RUNNER: ${{ inputs.macos_x64_runner }}
          INPUT_WINDOWS_X64_RUNNER: ${{ inputs.windows_x64_runner }}
        run: |
          # Add-Target appends one enabled platform entry and ignores the explicit "off" state.
          # Add-Target 用于追加启用的平台条目，并忽略显式关闭的 "off" 状态。
          function Add-Target {
            param(
              [System.Collections.Generic.List[object]]$Targets,
              [string]$Platform,
              [string]$Runner,
              [string]$OperatingSystem
            )

            if ([string]::IsNullOrWhiteSpace($Runner) -or $Runner -eq "off") {
              return
            }

            $Targets.Add([ordered]@{
              platform = $Platform
              runner = $Runner
              os = $OperatingSystem
            })
          }

          # Targets stores only the platforms that the user explicitly left enabled.
          # Targets 仅保存用户明确保持启用的平台，避免未选平台继续进入矩阵。
          $targets = [System.Collections.Generic.List[object]]::new()

          Add-Target -Targets $targets -Platform "linux-x64" -Runner $env:INPUT_LINUX_X64_RUNNER -OperatingSystem "Linux"
          Add-Target -Targets $targets -Platform "linux-arm64" -Runner $env:INPUT_LINUX_ARM64_RUNNER -OperatingSystem "Linux"
          Add-Target -Targets $targets -Platform "macos-arm64" -Runner $env:INPUT_MACOS_ARM64_RUNNER -OperatingSystem "macOS"
          Add-Target -Targets $targets -Platform "macos-x64" -Runner $env:INPUT_MACOS_X64_RUNNER -OperatingSystem "macOS"
          Add-Target -Targets $targets -Platform "windows-x64" -Runner $env:INPUT_WINDOWS_X64_RUNNER -OperatingSystem "Windows"

          $matrixJson = @{ include = @($targets) } | ConvertTo-Json -Compress -Depth 4
          $hasTargets = if ($targets.Count -gt 0) { "true" } else { "false" }

          "matrix=$matrixJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "has_targets=$hasTargets" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  no-targets:
    name: No Enabled Targets
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.has_targets != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped build
        shell: bash
        run: |
          echo "All platform runners are set to off. Nothing to build."

  build:
    name: ${{ matrix.platform }} @ ${{ matrix.runner }}
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.has_targets == 'true'
    runs-on: >-
      ${{
        (startsWith(matrix.runner, 'ubuntu') || startsWith(matrix.runner, 'macos') || startsWith(matrix.runner, 'windows'))
        && fromJSON(format('["{0}"]', matrix.runner))
        || fromJSON(format('["self-hosted", "{0}"]', matrix.runner))
      }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    env:
      # DEPS_STATE_KEY identifies one reusable dependency layout independent of release tag names.
      # DEPS_STATE_KEY 用于标识一套可复用的依赖布局，并且与发布标签名称解耦。
      DEPS_STATE_KEY: lua-deps-20260425-04-openssl-3.4.1-curl-8.13.0-zlib-1.3.1-pcre2-10.45-libyaml-0.2.5
      # DEPS_DIR points at the workspace-local dependency directory consumed by packaging steps.
      # DEPS_DIR 指向工作区内的依赖目录，后续打包步骤会直接使用这里的内容。
      DEPS_DIR: ${{ matrix.os == 'Windows' && format('{0}\deps', github.workspace) || format('{0}/deps', github.workspace) }}
      # ARCHIVE_NAME is shared by packaging and release upload steps to avoid duplicated string assembly.
      # ARCHIVE_NAME 供打包与发布上传步骤共享，避免重复拼接归档文件名。
      ARCHIVE_NAME: lua-deps-${{ matrix.platform }}.tar.gz
      # RELEASE_PACKAGE_DIR stores final user-facing runtime, SDK, and demo archives.
      # RELEASE_PACKAGE_DIR 保存最终面向用户的 runtime、SDK 与 demo 压缩包。
      RELEASE_PACKAGE_DIR: target/release-packages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust 1.94
        shell: pwsh
        run: |
          # InstallRustToolchain pins the compiler to the minimum version required by vldb-controller-client.
          # InstallRustToolchain 将编译器固定到 vldb-controller-client 要求的最低版本。
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustc --version
          cargo --version

      - name: Restore deps from local state (Windows)
        id: local-deps-windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # LocalRoot stores self-hosted runner state outside the workspace so repeated manual runs can reuse it.
          # LocalRoot 把自托管 runner 的状态保存在工作区之外，便于多次手动触发时直接复用。
          $localRoot = Join-Path $env:USERPROFILE ".cache\luaskills\lua-deps\${{ matrix.platform }}\${{ matrix.runner }}\$env:DEPS_STATE_KEY"
          $marker = Join-Path $localRoot ".complete"
          $restored = "false"
          $complete = "false"

          if (Test-Path $localRoot) {
            New-Item -ItemType Directory -Force -Path $env:DEPS_DIR | Out-Null
            Copy-Item -Recurse -Force (Join-Path $localRoot "*") $env:DEPS_DIR -ErrorAction SilentlyContinue
            $restored = "true"
            if (Test-Path $marker) {
              $complete = "true"
            }
            Write-Output "Reused local deps from $localRoot (complete=$complete)"
          }
          else {
            Write-Output "No reusable local deps found at $localRoot"
          }

          "hit=$restored" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "complete=$complete" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore deps from local state (Unix)
        id: local-deps-unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          local_root="$HOME/.cache/luaskills/lua-deps/${{ matrix.platform }}/${{ matrix.runner }}/$DEPS_STATE_KEY"
          marker="$local_root/.complete"
          restored="false"
          complete="false"

          if [ -d "$local_root" ]; then
            mkdir -p "$DEPS_DIR"
            cp -a "$local_root"/. "$DEPS_DIR"/
            restored="true"
            if [ -f "$marker" ]; then
              complete="true"
            fi
            echo "Reused local deps from $local_root (complete=$complete)"
          else
            echo "No reusable local deps found at $local_root"
          fi

          echo "hit=$restored" >> "$GITHUB_OUTPUT"
          echo "complete=$complete" >> "$GITHUB_OUTPUT"

      - name: Restore deps cache
        id: cache-deps
        if: steps.local-deps-windows.outputs.complete != 'true' && steps.local-deps-unix.outputs.complete != 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS_DIR }}
          key: ${{ matrix.os == 'Windows' && format('{0}-{1}-{2}-win-libyaml-{3}', env.DEPS_STATE_KEY, matrix.platform, matrix.runner, env.WINDOWS_LIBYAML_BUILD_VERSION) || format('{0}-{1}-{2}', env.DEPS_STATE_KEY, matrix.platform, matrix.runner) }}
          restore-keys: |
            ${{ matrix.os == 'Windows' && format('{0}-{1}-{2}-win-libyaml-', env.DEPS_STATE_KEY, matrix.platform, matrix.runner) || '' }}
            ${{ format('{0}-{1}-{2}', env.DEPS_STATE_KEY, matrix.platform, matrix.runner) }}

      - name: Check libyaml refresh state (Windows)
        id: libyaml-refresh-windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # This marker lets us refresh only Windows libyaml without invalidating the whole dependency bundle.
          # 该标记用于只刷新 Windows 的 libyaml，而不让整套依赖缓存全部失效。
          $libyamlDir = Join-Path $env:DEPS_DIR "libyaml"
          $markerPath = Join-Path $libyamlDir ".build-version"
          $needsRefresh = "false"

          if (-not (Test-Path $libyamlDir)) {
            $needsRefresh = "true"
          }
          elseif (-not (Test-Path $markerPath)) {
            $needsRefresh = "true"
          }
          else {
            $currentVersion = (Get-Content -Raw $markerPath).Trim()
            if ($currentVersion -ne $env:WINDOWS_LIBYAML_BUILD_VERSION) {
              $needsRefresh = "true"
            }
          }

          "needs_refresh=$needsRefresh" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Check dependency refresh state (Windows)
        id: windows-refresh
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Each component is checked independently so later failures do not force earlier successful builds to rerun.
          # 每个依赖单独检查，避免后续步骤失败时让前面已成功的构建再次重跑。
          $opensslNeeds = if (Test-Path (Join-Path $env:DEPS_DIR "openssl")) { "false" } else { "true" }
          $curlNeeds = if (Test-Path (Join-Path $env:DEPS_DIR "curl")) { "false" } else { "true" }
          $zlibNeeds = if (Test-Path (Join-Path $env:DEPS_DIR "zlib")) { "false" } else { "true" }
          $pcre2Needs = if (Test-Path (Join-Path $env:DEPS_DIR "pcre2")) { "false" } else { "true" }
          $libyamlNeeds = "${{ steps.libyaml-refresh-windows.outputs.needs_refresh }}"

          "openssl_needs_refresh=$opensslNeeds" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "curl_needs_refresh=$curlNeeds" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "zlib_needs_refresh=$zlibNeeds" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "pcre2_needs_refresh=$pcre2Needs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "libyaml_needs_refresh=$libyamlNeeds" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows' && (steps.windows-refresh.outputs.openssl_needs_refresh == 'true' || steps.windows-refresh.outputs.curl_needs_refresh == 'true' || steps.windows-refresh.outputs.zlib_needs_refresh == 'true' || steps.windows-refresh.outputs.pcre2_needs_refresh == 'true' || steps.windows-refresh.outputs.libyaml_needs_refresh == 'true')
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build tools (Windows)
        if: runner.os == 'Windows' && (steps.windows-refresh.outputs.openssl_needs_refresh == 'true' || steps.windows-refresh.outputs.curl_needs_refresh == 'true' || steps.windows-refresh.outputs.zlib_needs_refresh == 'true' || steps.windows-refresh.outputs.pcre2_needs_refresh == 'true' || steps.windows-refresh.outputs.libyaml_needs_refresh == 'true')
        shell: pwsh
        run: |
          # MissingTools collects only the Windows tools that are still absent on the current runner.
          # MissingTools 仅收集当前 runner 上仍然缺失的 Windows 构建工具，避免重复安装。
          $missingTools = @()
          foreach ($tool in @("cmake", "ninja", "nasm")) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              $missingTools += $tool
            }
          }

          if ($missingTools.Count -gt 0) {
            choco install -y @missingTools --no-progress
          }
          else {
            Write-Output "All Windows build tools already exist on this runner."
          }

          # PerlRoot stores the portable Perl runtime in a runner-persistent location instead of the workspace.
          # PerlRoot 将便携版 Perl 安装在 runner 可持久化的位置，而不是临时工作区。
          $perlRoot = Join-Path $env:USERPROFILE ".cache\luaskills\tools\perl\$env:PERL_VERSION"
          $perlBin = Join-Path $perlRoot "perl\bin"
          $perlExe = Join-Path $perlBin "perl.exe"

          if (-not (Test-Path $perlExe)) {
            $perlUrl = "https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/SP_53822_64bit/strawberry-perl-$env:PERL_VERSION-64bit-portable.zip"
            $perlFallbackUrl = "https://strawberryperl.com/download/$env:PERL_VERSION/strawberry-perl-$env:PERL_VERSION-64bit-portable.zip"
            $perlZip = Join-Path $env:TEMP "strawberry-perl-$env:PERL_VERSION.zip"

            try {
              curl -fSL $perlUrl -o $perlZip
            }
            catch {
              curl -fSL $perlFallbackUrl -o $perlZip
            }

            New-Item -ItemType Directory -Force -Path $perlRoot | Out-Null
            Expand-Archive $perlZip -DestinationPath $perlRoot -Force
          }

          $env:PATH = "$perlBin;$env:PATH"
          Add-Content $env:GITHUB_PATH "$perlBin"
          perl -v

          # NASM may be installed by Chocolatey under the default program files location.
          # NASM 在 Chocolatey 默认安装时通常位于 Program Files，需要显式补充到 PATH。
          $nasmPath = "C:\Program Files\NASM"
          if (Test-Path $nasmPath) {
            $env:PATH = "$nasmPath;$env:PATH"
            Add-Content $env:GITHUB_PATH $nasmPath
          }

      - name: Build OpenSSL (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.openssl_needs_refresh == 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/openssl/openssl/releases/download/openssl-$env:OPENSSL_VERSION/openssl-$env:OPENSSL_VERSION.tar.gz"
          curl -fSL $url -o openssl.tar.gz
          tar -xzf openssl.tar.gz
          Push-Location "openssl-$env:OPENSSL_VERSION"
          perl Configure VC-WIN64A --prefix="$env:DEPS_DIR\openssl" --openssldir="$env:DEPS_DIR\openssl\ssl" no-tests no-shared
          nmake
          nmake install_sw
          Pop-Location

      - name: Persist openssl to local state (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.openssl_needs_refresh == 'true'
        shell: pwsh
        run: |
          # Persist each dependency immediately so later failures do not discard earlier work.
          # 每个依赖一旦构建成功就立即持久化，避免后续失败导致前序成果丢失。
          $localRoot = Join-Path $env:USERPROFILE ".cache\luaskills\lua-deps\${{ matrix.platform }}\${{ matrix.runner }}\$env:DEPS_STATE_KEY"
          New-Item -ItemType Directory -Force -Path $localRoot | Out-Null
          Copy-Item -Recurse -Force "$env:DEPS_DIR\openssl" "$localRoot\"

      - name: Build zlib (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.zlib_needs_refresh == 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/madler/zlib/releases/download/v$env:ZLIB_VERSION/zlib-$env:ZLIB_VERSION.tar.gz"
          curl -fSL $url -o zlib.tar.gz
          tar -xzf zlib.tar.gz
          Push-Location "zlib-$env:ZLIB_VERSION"
          $buildDir = "build"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Push-Location $buildDir
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$env:DEPS_DIR\zlib" -DBUILD_SHARED_LIBS=ON
          ninja install
          Pop-Location
          Pop-Location

      - name: Persist zlib to local state (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.zlib_needs_refresh == 'true'
        shell: pwsh
        run: |
          $localRoot = Join-Path $env:USERPROFILE ".cache\luaskills\lua-deps\${{ matrix.platform }}\${{ matrix.runner }}\$env:DEPS_STATE_KEY"
          New-Item -ItemType Directory -Force -Path $localRoot | Out-Null
          Copy-Item -Recurse -Force "$env:DEPS_DIR\zlib" "$localRoot\"

      - name: Build curl (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.curl_needs_refresh == 'true'
        shell: pwsh
        run: |
          $url = "https://curl.se/download/curl-$env:CURL_VERSION.tar.gz"
          curl -fSL $url -o curl.tar.gz
          tar -xzf curl.tar.gz
          Push-Location "curl-$env:CURL_VERSION"
          $buildDir = "build"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Push-Location $buildDir
          cmake .. -GNinja "-DCMAKE_BUILD_TYPE=Release" "-DCMAKE_INSTALL_PREFIX=$env:DEPS_DIR\curl" "-DBUILD_SHARED_LIBS=ON" "-DBUILD_STATIC_LIBS=OFF" "-DBUILD_CURL_EXE=OFF" "-DBUILD_TESTING=OFF" "-DBUILD_LIBCURL_DOCS=OFF" "-DCURL_USE_OPENSSL=ON" "-DCURL_ZLIB=ON" "-DCURL_USE_LIBPSL=OFF" "-DOPENSSL_ROOT_DIR=$env:DEPS_DIR\openssl" "-DZLIB_ROOT=$env:DEPS_DIR\zlib"
          ninja install
          Pop-Location
          Pop-Location
          # CurlImportLib is the import library consumed by the Windows Lua-cURL rockspec.
          # CurlImportLib 是 Windows Lua-cURL rockspec 链接时使用的导入库。
          $curlImportLib = Join-Path $env:DEPS_DIR "curl\lib\libcurl_imp.lib"
          # CurlRuntimeDll is the runtime library that must be copied into release packages.
          # CurlRuntimeDll 是需要复制进发布包的运行期库。
          $curlRuntimeDll = Join-Path $env:DEPS_DIR "curl\bin\libcurl.dll"
          if (-not (Test-Path $curlImportLib)) {
            throw "curl shared import library was not produced: $curlImportLib"
          }
          if (-not (Test-Path $curlRuntimeDll)) {
            throw "curl runtime DLL was not produced: $curlRuntimeDll"
          }

      - name: Persist curl to local state (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.curl_needs_refresh == 'true'
        shell: pwsh
        run: |
          $localRoot = Join-Path $env:USERPROFILE ".cache\luaskills\lua-deps\${{ matrix.platform }}\${{ matrix.runner }}\$env:DEPS_STATE_KEY"
          New-Item -ItemType Directory -Force -Path $localRoot | Out-Null
          Copy-Item -Recurse -Force "$env:DEPS_DIR\curl" "$localRoot\"

      - name: Build PCRE2 (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.pcre2_needs_refresh == 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/PCRE2Project/pcre2/releases/download/pcre2-$env:PCRE2_VERSION/pcre2-$env:PCRE2_VERSION.tar.gz"
          curl -fSL $url -o pcre2.tar.gz
          tar -xzf pcre2.tar.gz
          Push-Location "pcre2-$env:PCRE2_VERSION"
          $buildDir = "build"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Push-Location $buildDir
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$env:DEPS_DIR\pcre2" -DBUILD_SHARED_LIBS=OFF -DPCRE2_SUPPORT_JIT=ON
          ninja install
          Pop-Location
          Pop-Location

      - name: Persist pcre2 to local state (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.pcre2_needs_refresh == 'true'
        shell: pwsh
        run: |
          $localRoot = Join-Path $env:USERPROFILE ".cache\luaskills\lua-deps\${{ matrix.platform }}\${{ matrix.runner }}\$env:DEPS_STATE_KEY"
          New-Item -ItemType Directory -Force -Path $localRoot | Out-Null
          Copy-Item -Recurse -Force "$env:DEPS_DIR\pcre2" "$localRoot\"

      - name: Build libyaml (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.libyaml_needs_refresh == 'true'
        shell: pwsh
        run: |
          # Build libyaml from the Git tag archive because the release asset omits CMake support files.
          # 使用 Git tag 源码归档构建 libyaml，因为 release 附件缺少 CMake 所需的辅助文件。
          $url = "https://github.com/yaml/libyaml/archive/refs/tags/$env:LIBYAML_VERSION.tar.gz"
          curl -fSL $url -o libyaml.tar.gz
          tar -xzf libyaml.tar.gz
          Push-Location "libyaml-$env:LIBYAML_VERSION"

          $buildDir = "build"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Push-Location $buildDir
          # PowerShell can split unquoted dotted values, so every -D flag is passed as a single string.
          # PowerShell 会拆分未加引号的小数值，因此每个 -D 参数都显式作为单个字符串传入。
          cmake .. -G Ninja "-DCMAKE_BUILD_TYPE=Release" "-DCMAKE_INSTALL_PREFIX=$env:DEPS_DIR\libyaml" "-DBUILD_SHARED_LIBS=OFF" "-DBUILD_TESTING=OFF" "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          ninja install
          Pop-Location
          Pop-Location

      - name: Write libyaml build marker (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.libyaml_needs_refresh == 'true'
        shell: pwsh
        run: |
          # The marker records the Windows libyaml fix level so future runs can refresh only this component.
          # 该标记记录 Windows libyaml 的修复级别，便于后续仅刷新这个组件。
          $libyamlDir = Join-Path $env:DEPS_DIR "libyaml"
          $markerPath = Join-Path $libyamlDir ".build-version"
          New-Item -ItemType Directory -Force -Path $libyamlDir | Out-Null
          Set-Content -Path $markerPath -Value $env:WINDOWS_LIBYAML_BUILD_VERSION -NoNewline

      - name: Persist libyaml to local state (Windows)
        if: runner.os == 'Windows' && steps.windows-refresh.outputs.libyaml_needs_refresh == 'true'
        shell: pwsh
        run: |
          $localRoot = Join-Path $env:USERPROFILE ".cache\luaskills\lua-deps\${{ matrix.platform }}\${{ matrix.runner }}\$env:DEPS_STATE_KEY"
          New-Item -ItemType Directory -Force -Path $localRoot | Out-Null
          Copy-Item -Recurse -Force "$env:DEPS_DIR\libyaml" "$localRoot\"

      - name: Install build tools (Linux)
        if: runner.os == 'Linux' && steps.local-deps-unix.outputs.hit != 'true' && steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # missing_tools only records commands that are truly absent, which keeps self-hosted runners fast.
          # missing_tools 只记录确实缺失的命令，从而让自托管 runner 尽量避免重复安装。
          missing_tools=()
          for tool in gcc g++ make cmake perl; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing_tools+=("$tool")
            fi
          done

          if [ "${#missing_tools[@]}" -eq 0 ]; then
            echo "All Linux build tools already exist on this runner."
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::Missing Linux build tools: ${missing_tools[*]}, and apt-get is unavailable."
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y build-essential cmake perl libperl-dev

      - name: Build deps (Linux)
        if: runner.os == 'Linux' && steps.local-deps-unix.outputs.hit != 'true' && steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          jobs="$(nproc)"

          curl -fSL "https://github.com/openssl/openssl/releases/download/openssl-$OPENSSL_VERSION/openssl-$OPENSSL_VERSION.tar.gz" | tar xz
          cd "openssl-$OPENSSL_VERSION"
          ./config --prefix="$DEPS_DIR/openssl" --openssldir="$DEPS_DIR/openssl/ssl" --libdir=lib no-tests shared
          make -j"$jobs"
          make install_sw
          cd ..

          curl -fSL "https://github.com/madler/zlib/releases/download/v$ZLIB_VERSION/zlib-$ZLIB_VERSION.tar.gz" | tar xz
          cd "zlib-$ZLIB_VERSION"
          CFLAGS="-fPIC" ./configure --prefix="$DEPS_DIR/zlib"
          make -j"$jobs"
          make install
          cd ..

          curl -fSL "https://curl.se/download/curl-$CURL_VERSION.tar.gz" | tar xz
          cd "curl-$CURL_VERSION"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$DEPS_DIR/curl" -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=OFF -DBUILD_CURL_EXE=OFF -DBUILD_TESTING=OFF -DBUILD_LIBCURL_DOCS=OFF -DCURL_USE_OPENSSL=ON -DCURL_ZLIB=ON -DCURL_USE_LIBPSL=OFF -DOPENSSL_ROOT_DIR="$DEPS_DIR/openssl" -DZLIB_ROOT="$DEPS_DIR/zlib"
          cmake --build build --parallel "$jobs"
          cmake --install build
          cd ..

          curl -fSL "https://github.com/PCRE2Project/pcre2/releases/download/pcre2-$PCRE2_VERSION/pcre2-$PCRE2_VERSION.tar.gz" | tar xz
          cd "pcre2-$PCRE2_VERSION"
          ./configure --prefix="$DEPS_DIR/pcre2" --enable-jit --enable-shared --disable-static
          make -j"$jobs"
          make install
          cd ..

          curl -fSL "https://github.com/yaml/libyaml/releases/download/$LIBYAML_VERSION/yaml-$LIBYAML_VERSION.tar.gz" | tar xz
          cd "yaml-$LIBYAML_VERSION"
          ./configure --prefix="$DEPS_DIR/libyaml" --enable-shared --disable-static
          make -j"$jobs"
          make install
          cd ..

      - name: Install build tools (macOS)
        if: runner.os == 'macOS' && steps.local-deps-unix.outputs.hit != 'true' && steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          missing_tools=()
          for tool in clang make cmake perl; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing_tools+=("$tool")
            fi
          done

          if [ "${#missing_tools[@]}" -eq 0 ]; then
            echo "All macOS build tools already exist on this runner."
            exit 0
          fi

          if ! command -v brew >/dev/null 2>&1; then
            echo "::error::Missing macOS build tools: ${missing_tools[*]}, and Homebrew is unavailable."
            exit 1
          fi

          brew install cmake perl

      - name: Build deps (macOS)
        if: runner.os == 'macOS' && steps.local-deps-unix.outputs.hit != 'true' && steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          jobs="$(sysctl -n hw.ncpu)"

          curl -fSL "https://github.com/openssl/openssl/releases/download/openssl-$OPENSSL_VERSION/openssl-$OPENSSL_VERSION.tar.gz" | tar xz
          cd "openssl-$OPENSSL_VERSION"
          ./config --prefix="$DEPS_DIR/openssl" --openssldir="$DEPS_DIR/openssl/ssl" --libdir=lib no-tests shared
          make -j"$jobs"
          make install_sw
          cd ..

          curl -fSL "https://github.com/madler/zlib/releases/download/v$ZLIB_VERSION/zlib-$ZLIB_VERSION.tar.gz" | tar xz
          cd "zlib-$ZLIB_VERSION"
          CFLAGS="-fPIC" ./configure --prefix="$DEPS_DIR/zlib"
          make -j"$jobs"
          make install
          cd ..

          curl -fSL "https://curl.se/download/curl-$CURL_VERSION.tar.gz" | tar xz
          cd "curl-$CURL_VERSION"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$DEPS_DIR/curl" -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=OFF -DBUILD_CURL_EXE=OFF -DBUILD_TESTING=OFF -DBUILD_LIBCURL_DOCS=OFF -DCURL_USE_OPENSSL=ON -DCURL_ZLIB=ON -DCURL_USE_LIBPSL=OFF -DOPENSSL_ROOT_DIR="$DEPS_DIR/openssl" -DZLIB_ROOT="$DEPS_DIR/zlib"
          cmake --build build --parallel "$jobs"
          cmake --install build
          cd ..

          curl -fSL "https://github.com/PCRE2Project/pcre2/releases/download/pcre2-$PCRE2_VERSION/pcre2-$PCRE2_VERSION.tar.gz" | tar xz
          cd "pcre2-$PCRE2_VERSION"
          ./configure --prefix="$DEPS_DIR/pcre2" --enable-jit --enable-shared --disable-static
          make -j"$jobs"
          make install
          cd ..

          curl -fSL "https://github.com/yaml/libyaml/releases/download/$LIBYAML_VERSION/yaml-$LIBYAML_VERSION.tar.gz" | tar xz
          cd "yaml-$LIBYAML_VERSION"
          ./configure --prefix="$DEPS_DIR/libyaml" --enable-shared --disable-static
          make -j"$jobs"
          make install
          cd ..

      - name: Verify deps layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($dir in @("openssl", "curl", "zlib", "pcre2", "libyaml")) {
            $path = Join-Path $env:DEPS_DIR $dir
            if (-not (Test-Path $path)) {
              throw "Missing dependency directory: $path"
            }
          }

      - name: Verify deps layout (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          for dir in openssl curl zlib pcre2 libyaml; do
            if [ ! -d "$DEPS_DIR/$dir" ]; then
              echo "::error::Missing dependency directory: $DEPS_DIR/$dir"
              exit 1
            fi
          done

      - name: Persist deps to local state (Windows)
        if: runner.os == 'Windows' && steps.local-deps-windows.outputs.complete != 'true'
        shell: pwsh
        run: |
          $localRoot = Join-Path $env:USERPROFILE ".cache\luaskills\lua-deps\${{ matrix.platform }}\${{ matrix.runner }}\$env:DEPS_STATE_KEY"
          New-Item -ItemType Directory -Force -Path $localRoot | Out-Null
          Copy-Item -Recurse -Force (Join-Path $env:DEPS_DIR "*") $localRoot
          New-Item -ItemType File -Force -Path (Join-Path $localRoot ".complete") | Out-Null

      - name: Persist deps to local state (Unix)
        if: runner.os != 'Windows' && steps.local-deps-unix.outputs.complete != 'true'
        shell: bash
        run: |
          set -euo pipefail
          local_root="$HOME/.cache/luaskills/lua-deps/${{ matrix.platform }}/${{ matrix.runner }}/$DEPS_STATE_KEY"
          mkdir -p "$local_root"
          cp -a "$DEPS_DIR"/. "$local_root"/
          touch "$local_root/.complete"

      - name: Package deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:RELEASE_PACKAGE_DIR | Out-Null
          Get-ChildItem -LiteralPath $env:DEPS_DIR -File -Filter "lua-deps*.tar*" -ErrorAction SilentlyContinue | Remove-Item -Force
          $archivePath = Join-Path (Join-Path $env:GITHUB_WORKSPACE $env:RELEASE_PACKAGE_DIR) $env:ARCHIVE_NAME
          Push-Location $env:DEPS_DIR
          # PowerShell must pass archive members as explicit strings, otherwise trailing slashes can collapse into invalid args.
          # PowerShell 需要把归档成员作为显式字符串传入，否则尾部斜杠可能被折叠成无效参数。
          $archiveMembers = @("openssl", "curl", "zlib", "pcre2", "libyaml")
          tar czf $archivePath @archiveMembers
          Pop-Location

          $sizeMb = (Get-Item $archivePath).Length / 1MB
          Write-Output "Package size: $("{0:F1}" -f $sizeMb) MB"

      - name: Package deps (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RELEASE_PACKAGE_DIR"
          find "$DEPS_DIR" -maxdepth 1 -type f -name 'lua-deps*.tar*' -delete
          cd "$DEPS_DIR"
          tar czf "$GITHUB_WORKSPACE/$RELEASE_PACKAGE_DIR/$ARCHIVE_NAME" openssl/ curl/ zlib/ pcre2/ libyaml/
          echo "Package size: $(du -h "$GITHUB_WORKSPACE/$RELEASE_PACKAGE_DIR/$ARCHIVE_NAME" | cut -f1)"

      - name: Prepare Lua runtime dependency inputs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # The Lua package installer expects native dependencies under third_party/deps.
          # Lua 包安装脚本期望原生依赖位于 third_party/deps。
          New-Item -ItemType Directory -Force -Path "third_party\deps" | Out-Null
          Copy-Item -Recurse -Force (Join-Path $env:DEPS_DIR "*") "third_party\deps" -ErrorAction SilentlyContinue

      - name: Prepare Lua runtime dependency inputs (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p third_party/deps
          cp -a "$DEPS_DIR"/. third_party/deps/

      - name: Build LuaSkills library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release

      - name: Build LuaSkills library (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release

      - name: Install Lua packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/install_lua_deps.ps1

      - name: Install Lua packages (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/install_lua_deps.sh

      - name: Install Lua packages (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install bash
          "$(brew --prefix)/bin/bash" scripts/install_lua_deps.sh

      - name: Package release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/package_lua_runtime.ps1 -Platform "${{ matrix.platform }}" -OutputDir "$env:RELEASE_PACKAGE_DIR"
          powershell -ExecutionPolicy Bypass -File scripts/package_ffi_sdk.ps1 -Platform "${{ matrix.platform }}" -OutputDir "$env:RELEASE_PACKAGE_DIR"
          powershell -ExecutionPolicy Bypass -File scripts/package_demo.ps1 -Mode ffi -Platform "${{ matrix.platform }}" -OutputDir "$env:RELEASE_PACKAGE_DIR" -ReleaseTag "${{ inputs.version }}"
          powershell -ExecutionPolicy Bypass -File scripts/package_demo.ps1 -Mode rust -Platform "${{ matrix.platform }}" -OutputDir "$env:RELEASE_PACKAGE_DIR" -ReleaseTag "${{ inputs.version }}"
          # ExpectedAssets prevents the release step from silently publishing an incomplete platform set.
          # ExpectedAssets 防止发布步骤静默上传缺少 runtime 等关键文件的平台产物集合。
          $expectedAssets = @(
            "lua-deps-${{ matrix.platform }}.tar.gz",
            "lua-runtime-${{ matrix.platform }}.tar.gz",
            "luaskills-ffi-sdk-${{ matrix.platform }}.tar.gz",
            "luaskills-demo-ffi-${{ matrix.platform }}.tar.gz",
            "luaskills-demo-rust-${{ matrix.platform }}.tar.gz"
          )
          $releasePackageDir = Join-Path $env:GITHUB_WORKSPACE $env:RELEASE_PACKAGE_DIR
          foreach ($asset in $expectedAssets) {
            $assetPath = Join-Path $releasePackageDir $asset
            if (-not (Test-Path -LiteralPath $assetPath)) {
              throw "Missing expected release asset: $assetPath"
            }
          }

      - name: Package release assets (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/package_lua_runtime.sh "${{ matrix.platform }}"
          bash scripts/package_ffi_sdk.sh "${{ matrix.platform }}"
          bash scripts/package_demo.sh ffi "${{ matrix.platform }}" "${{ inputs.version }}"
          bash scripts/package_demo.sh rust "${{ matrix.platform }}" "${{ inputs.version }}"
          # ExpectedAssets prevents the release step from silently publishing an incomplete platform set.
          # ExpectedAssets 防止发布步骤静默上传缺少 runtime 等关键文件的平台产物集合。
          for asset in \
            "lua-deps-${{ matrix.platform }}.tar.gz" \
            "lua-runtime-${{ matrix.platform }}.tar.gz" \
            "luaskills-ffi-sdk-${{ matrix.platform }}.tar.gz" \
            "luaskills-demo-ffi-${{ matrix.platform }}.tar.gz" \
            "luaskills-demo-rust-${{ matrix.platform }}.tar.gz"; do
            test -f "$GITHUB_WORKSPACE/$RELEASE_PACKAGE_DIR/$asset" || {
              echo "Missing expected release asset: $GITHUB_WORKSPACE/$RELEASE_PACKAGE_DIR/$asset" >&2
              exit 1
            }
          done

      - name: Write release description (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:RELEASE_PACKAGE_DIR | Out-Null
          Copy-Item -Force -LiteralPath "scripts\lua_runtime_release_notes.md" -Destination (Join-Path $env:RELEASE_PACKAGE_DIR "RELEASE_NOTES.md")

      - name: Write release description (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RELEASE_PACKAGE_DIR"
          cp scripts/lua_runtime_release_notes.md "$RELEASE_PACKAGE_DIR/RELEASE_NOTES.md"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.RELEASE_PACKAGE_DIR }}/*.tar.gz
          tag_name: ${{ inputs.version }}
          body_path: ${{ env.RELEASE_PACKAGE_DIR }}/RELEASE_NOTES.md
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
