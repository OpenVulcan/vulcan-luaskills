name: Build FFI SDK and Demo Packages

# This workflow publishes only the main-repo release artifacts that still belong to luaskills.
# 该工作流仅发布仍然属于 luaskills 主仓库的发布资产。
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.3.1)"
        required: false
        default: ""
      linux_x64_runner:
        description: "Linux x64 runner (off to disable)"
        required: true
        default: "ubuntu-24.04"
        type: choice
        options: ["off", "ubuntu-24.04"]
      linux_arm64_runner:
        description: "Linux ARM64 runner (off to disable)"
        required: true
        default: "ubuntu-24.04-arm"
        type: choice
        options: ["off", "ubuntu-24.04-arm"]
      macos_arm64_runner:
        description: "macOS ARM64 runner (off to disable)"
        required: true
        default: "macos-15"
        type: choice
        options: ["off", "macos-15"]
      macos_x64_runner:
        description: "macOS x64 runner (off to disable)"
        required: true
        default: "macos-15-intel"
        type: choice
        options: ["off", "macos-15-intel"]
      windows_x64_runner:
        description: "Windows x64 runner (off to disable)"
        required: true
        default: "windows-latest"
        type: choice
        options: ["off", "windows-latest"]

permissions:
  contents: write

concurrency:
  group: release-packages-${{ github.workflow }}-${{ inputs.version || github.run_id }}
  cancel-in-progress: true

jobs:
  prepare-matrix:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_targets: ${{ steps.build-matrix.outputs.has_targets }}
      release_tag: ${{ steps.resolve-version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve-version
        shell: pwsh
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # ReleaseTag prefers the manual input and falls back to Cargo.toml version when left blank.
          # ReleaseTag 优先使用手动输入；若留空，则回退到 Cargo.toml 中的版本号。
          $releaseTag = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            $cargoToml = Get-Content -Raw -LiteralPath "Cargo.toml"
            $versionMatch = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"([^"]+)"')
            if (-not $versionMatch.Success) {
              throw "Unable to resolve version from Cargo.toml"
            }
            $releaseTag = "v$($versionMatch.Groups[1].Value)"
          }

          if ($releaseTag -notmatch '^v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z\.-]+)?$') {
            throw "Resolved release tag is invalid: $releaseTag"
          }

          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build matrix from manual runner inputs
        id: build-matrix
        shell: pwsh
        env:
          INPUT_LINUX_X64_RUNNER: ${{ inputs.linux_x64_runner }}
          INPUT_LINUX_ARM64_RUNNER: ${{ inputs.linux_arm64_runner }}
          INPUT_MACOS_ARM64_RUNNER: ${{ inputs.macos_arm64_runner }}
          INPUT_MACOS_X64_RUNNER: ${{ inputs.macos_x64_runner }}
          INPUT_WINDOWS_X64_RUNNER: ${{ inputs.windows_x64_runner }}
        run: |
          # Add-Target appends one enabled platform entry and ignores the explicit "off" state.
          # Add-Target 用于追加启用的平台条目，并忽略显式关闭的 "off" 状态。
          function Add-Target {
            param(
              [System.Collections.Generic.List[object]]$Targets,
              [string]$Platform,
              [string]$Runner,
              [string]$OperatingSystem
            )

            if ([string]::IsNullOrWhiteSpace($Runner) -or $Runner -eq "off") {
              return
            }

            $Targets.Add([ordered]@{
              platform = $Platform
              runner = $Runner
              os = $OperatingSystem
            })
          }

          $targets = [System.Collections.Generic.List[object]]::new()
          Add-Target -Targets $targets -Platform "linux-x64" -Runner $env:INPUT_LINUX_X64_RUNNER -OperatingSystem "Linux"
          Add-Target -Targets $targets -Platform "linux-arm64" -Runner $env:INPUT_LINUX_ARM64_RUNNER -OperatingSystem "Linux"
          Add-Target -Targets $targets -Platform "macos-arm64" -Runner $env:INPUT_MACOS_ARM64_RUNNER -OperatingSystem "macOS"
          Add-Target -Targets $targets -Platform "macos-x64" -Runner $env:INPUT_MACOS_X64_RUNNER -OperatingSystem "macOS"
          Add-Target -Targets $targets -Platform "windows-x64" -Runner $env:INPUT_WINDOWS_X64_RUNNER -OperatingSystem "Windows"

          $matrixJson = @{ include = @($targets) } | ConvertTo-Json -Compress -Depth 4
          $hasTargets = if ($targets.Count -gt 0) { "true" } else { "false" }

          "matrix=$matrixJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "has_targets=$hasTargets" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  no-targets:
    name: No Enabled Targets
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.has_targets != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped build
        shell: bash
        run: |
          echo "All platform runners are set to off. Nothing to build."

  build:
    name: ${{ matrix.platform }} @ ${{ matrix.runner }}
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.has_targets == 'true'
    runs-on: >-
      ${{
        (startsWith(matrix.runner, 'ubuntu') || startsWith(matrix.runner, 'macos') || startsWith(matrix.runner, 'windows'))
        && fromJSON(format('["{0}"]', matrix.runner))
        || fromJSON(format('["self-hosted", "{0}"]', matrix.runner))
      }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    env:
      RELEASE_PACKAGE_DIR: target/release-packages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust 1.94
        shell: pwsh
        run: |
          # InstallRustToolchain pins the compiler to the minimum version required by vldb-controller-client.
          # InstallRustToolchain 将编译器固定到 vldb-controller-client 要求的最低版本。
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustc --version
          cargo --version

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build LuaSkills library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release

      - name: Build LuaSkills library (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release

      - name: Package release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/package_ffi_sdk.ps1 -Platform "${{ matrix.platform }}" -OutputDir "$env:RELEASE_PACKAGE_DIR"
          powershell -ExecutionPolicy Bypass -File scripts/package_demo.ps1 -Mode ffi -Platform "${{ matrix.platform }}" -OutputDir "$env:RELEASE_PACKAGE_DIR" -ReleaseTag "${{ needs.prepare-matrix.outputs.release_tag }}"
          powershell -ExecutionPolicy Bypass -File scripts/package_demo.ps1 -Mode rust -Platform "${{ matrix.platform }}" -OutputDir "$env:RELEASE_PACKAGE_DIR" -ReleaseTag "${{ needs.prepare-matrix.outputs.release_tag }}"
          # ExpectedAssets prevents the release step from silently publishing an incomplete platform set.
          # ExpectedAssets 防止发布步骤静默上传缺少关键文件的平台产物集合。
          $expectedAssets = @(
            "luaskills-ffi-sdk-${{ matrix.platform }}.tar.gz",
            "luaskills-demo-ffi-${{ matrix.platform }}.tar.gz",
            "luaskills-demo-rust-${{ matrix.platform }}.tar.gz"
          )
          $releasePackageDir = Join-Path $env:GITHUB_WORKSPACE $env:RELEASE_PACKAGE_DIR
          foreach ($asset in $expectedAssets) {
            $assetPath = Join-Path $releasePackageDir $asset
            if (-not (Test-Path -LiteralPath $assetPath)) {
              throw "Missing expected release asset: $assetPath"
            }
            # SidecarHash keeps SDK installers able to verify every release archive before extraction.
            # SidecarHash 确保 SDK 安装器在解压前可校验每个发布归档。
            $sidecarPath = "$assetPath.sha256"
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $assetPath).Hash.ToLowerInvariant()
            "$hash  $asset" | Set-Content -Path $sidecarPath -Encoding ascii
          }

      - name: Package release assets (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/package_ffi_sdk.sh "${{ matrix.platform }}"
          bash scripts/package_demo.sh ffi "${{ matrix.platform }}" "${{ needs.prepare-matrix.outputs.release_tag }}"
          bash scripts/package_demo.sh rust "${{ matrix.platform }}" "${{ needs.prepare-matrix.outputs.release_tag }}"
          # ExpectedAssets prevents the release step from silently publishing an incomplete platform set.
          # ExpectedAssets 防止发布步骤静默上传缺少关键文件的平台产物集合。
          for asset in \
            "luaskills-ffi-sdk-${{ matrix.platform }}.tar.gz" \
            "luaskills-demo-ffi-${{ matrix.platform }}.tar.gz" \
            "luaskills-demo-rust-${{ matrix.platform }}.tar.gz"; do
            test -f "$GITHUB_WORKSPACE/$RELEASE_PACKAGE_DIR/$asset" || {
              echo "Missing expected release asset: $GITHUB_WORKSPACE/$RELEASE_PACKAGE_DIR/$asset" >&2
              exit 1
            }
            # SidecarHash keeps SDK installers able to verify every release archive before extraction.
            # SidecarHash 确保 SDK 安装器在解压前可校验每个发布归档。
            (cd "$GITHUB_WORKSPACE/$RELEASE_PACKAGE_DIR" && sha256sum "$asset" > "$asset.sha256")
          done

      - name: Write release description (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:RELEASE_PACKAGE_DIR | Out-Null
          Copy-Item -Force -LiteralPath "scripts\lua_runtime_release_notes.md" -Destination (Join-Path $env:RELEASE_PACKAGE_DIR "RELEASE_NOTES.md")

      - name: Write release description (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RELEASE_PACKAGE_DIR"
          cp scripts/lua_runtime_release_notes.md "$RELEASE_PACKAGE_DIR/RELEASE_NOTES.md"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.RELEASE_PACKAGE_DIR }}/*.tar.gz
            ${{ env.RELEASE_PACKAGE_DIR }}/*.sha256
          tag_name: ${{ needs.prepare-matrix.outputs.release_tag }}
          body_path: ${{ env.RELEASE_PACKAGE_DIR }}/RELEASE_NOTES.md
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
